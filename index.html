<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puxa Ferro | Gestão Administrativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        
        /* Sistema de Notificações (Toasts) */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { animation: slideIn 0.3s ease-out forwards; min-width: 280px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Estilo da Sidebar */
        .sidebar-dark { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); transition: 0.4s; }
        @media (max-width: 1024px) {
            .sidebar-mobile { position: fixed; left: -100%; top: 0; bottom: 0; z-index: 50; }
            .sidebar-mobile.active { left: 0; }
        }

        /* Botão com a cor da Header (Slate 900) */
        .btn-header-color { background-color: #0f172a; color: white; transition: 0.3s; }
        .btn-header-color:hover { background-color: #1e293b; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2); }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">

    <div id="toast-container"></div>

    <div id="telaLogin" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-md shadow-2xl">
            <div class="text-center mb-10">
                <div class="inline-block p-4 bg-amber-400 rounded-3xl mb-4">
                    <i class="fas fa-dumbbell text-3xl text-slate-900"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900">Acesso Restrito</h2>
            </div>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="usuario" placeholder="Utilizador" required class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-amber-400">
                <input type="password" id="password" placeholder="Palavra-passe" required class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-amber-400">
                <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg mt-2 uppercase tracking-wider">Entrar</button>
            </form>
        </div>
    </div>

    <div class="lg:hidden bg-slate-900 text-white p-5 flex justify-between items-center sticky top-0 z-40">
        <h1 class="text-xl font-black italic">PUXA<span class="text-amber-400">FERRO</span></h1>
        <button onclick="toggleMenu()" class="p-2 bg-slate-800 rounded-lg"><i class="fas fa-bars"></i></button>
    </div>

    <aside id="sidebar" class="w-72 sidebar-dark text-white p-8 flex flex-col sidebar-mobile lg:flex shrink-0">
        <div class="mb-12 hidden lg:block">
            <h1 class="text-2xl font-black italic tracking-tighter">PUXA<span class="text-amber-400">FERRO</span></h1>
        </div>
        <nav class="flex-1 space-y-2">
            <a href="#" class="flex items-center gap-4 p-4 bg-amber-400 text-slate-900 rounded-2xl font-bold">
                <i class="fas fa-users"></i> Alunos
            </a>
        </nav>
        <button id="btnSair" class="flex items-center gap-3 text-red-400 font-bold p-4 mt-auto hover:bg-red-400/10 rounded-2xl transition-all">
            <i class="fas fa-sign-out-alt"></i> Terminar Sessão
        </button>
    </aside>

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <main class="flex-1 p-6 lg:p-12 overflow-y-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight">Gestão de Alunos</h2>
                <p class="text-slate-500 font-medium mt-1">Administração de membros e matrículas</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-4 px-8">
                <div class="text-center">
                    <span class="text-slate-400 text-[10px] font-bold uppercase tracking-widest block mb-1">Total Ativos</span>
                    <span id="totalCount" class="text-3xl font-black text-slate-900">0</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
            <section class="xl:col-span-4 order-2 xl:order-1">
                <div class="bg-white p-8 rounded-[35px] shadow-xl shadow-slate-200/50 sticky top-10 border border-slate-50">
                    <h3 id="formTitle" class="text-xl font-extrabold mb-8 flex items-center gap-3 text-slate-800">
                        <span class="w-2 h-7 bg-amber-400 rounded-full"></span> Novo Registo
                    </h3>
                    <form id="alunoForm" class="space-y-5">
                        <input type="hidden" id="aluno_id">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Nome Completo</label>
                            <input type="text" id="nome" required class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-amber-400 transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">CPF (Apenas Números)</label>
                            <input type="tel" id="cpf_cadastro" required  minlength="11" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-amber-400 font-mono" >
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Status de Acesso</label>
                            <select id="statusdeacesso" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 font-bold outline-none focus:ring-2 focus:ring-amber-400 cursor-pointer">
                                <option value="ATIVO">ATIVO</option>
                                <option value="BLOQUEADO">BLOQUEADO</option>
                            </select>
                        </div>
                        <button type="submit" id="btnSalvar" class="w-full btn-header-color font-extrabold py-5 rounded-3xl shadow-lg mt-4 uppercase">Salvar Dados</button>
                    </form>
                </div>
            </section>

            <section class="xl:col-span-8 order-1 xl:order-2">
                <div class="flex gap-4 mb-8">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="text" id="inputPesquisa" placeholder="Procurar aluno por nome ou CPF..." 
                            class="w-full bg-white p-5 pl-14 rounded-3xl border border-slate-100 shadow-sm outline-none focus:ring-2 focus:ring-amber-400 font-medium">
                    </div>
                </div>

                <div class="bg-white rounded-[35px] shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-50">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left min-w-[550px]">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="px-10 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Identificação</th>
                                    <th class="px-10 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Estado</th>
                                    <th class="px-10 py-6 text-right text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaAlunos" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="admin.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('hidden');
        }
    </script>
</body>
</html>
